name: CervixAI CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────
  # Backend — Python lint + health check
  # ──────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install lightweight deps for linting
        run: |
          pip install flake8 pyflakes

      - name: Lint with flake8
        run: |
          # Stop build on syntax errors or undefined names
          flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings only for style issues
          flake8 app.py --count --exit-zero --max-complexity=12 --max-line-length=120 --statistics

      - name: Check app imports structure
        run: |
          python -c "
          import ast, sys
          with open('app.py') as f:
              source = f.read()
          try:
              ast.parse(source)
              print('✓ app.py syntax valid')
          except SyntaxError as e:
              print(f'✗ Syntax error: {e}')
              sys.exit(1)
          "

  # ──────────────────────────────────────────
  # Frontend — Node lint + build check
  # ──────────────────────────────────────────
  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build production bundle
        env:
          VITE_API_URL: https://placeholder-backend.onrender.com
        run: npm run build

      - name: Check bundle size
        run: |
          du -sh dist/
          echo "✓ Build successful"

  # ──────────────────────────────────────────
  # Summary badge
  # ──────────────────────────────────────────
  status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()
    steps:
      - name: Report
        run: |
          if [[ "${{ needs.backend.result }}" == "success" && "${{ needs.frontend.result }}" == "success" ]]; then
            echo "✅ All checks passed"
          else
            echo "❌ One or more checks failed"
            exit 1
          fi
